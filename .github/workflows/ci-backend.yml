name: "Backend CI Spring boot & Java 21"

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main    

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Configurar JDK 25"
        uses: action/setup-java@v4
        with: 
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: "Dar"
        run: chmod +x ./gradlew

      - name: "Gradle Build"
        run: ./gradlew build

